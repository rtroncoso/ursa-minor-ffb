name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --lib --tests -- -D warnings

      - name: Test (lib + integration)
        run: cargo test --lib --tests --locked

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build app
        run: cargo build --features app --locked

      - name: Build updater
        run: cargo build --bin ursa-minor-updater --features updater --locked

      - name: Test
        run: cargo test --features app --locked
